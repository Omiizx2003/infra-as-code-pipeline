name: Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ecommerce-app
  ECS_CLUSTER: ecommerce-staging-cluster
  ECS_SERVICE: ecommerce-service
  TASK_FAMILY: ecommerce

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY ./app

    - name: Tag Docker Image
      run: |
        docker tag $ECR_REPOSITORY:latest \
        343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Push Image to ECR
      run: |
        docker push \
        343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Force ECS Deployment
      run: |
        aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --force-new-deployment