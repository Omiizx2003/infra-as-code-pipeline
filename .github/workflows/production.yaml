name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ecommerce-staging
  ECS_CLUSTER: ecommerce-default-cluster
  ECS_SERVICE: ecommerce-service
jobs:
  production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build image
        run: docker build -t $ECR_REPOSITORY ./app

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push image
        run: |
          docker push \
          343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment

      - name: Wait for Deployment
        id: deploy
        continue-on-error: true
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      - name: Rollback
        if: steps.deploy.outcome == 'failure'
        run: |

          CURRENT=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query "services[0].taskDefinition" \
            --output text)

          FAMILY=$(echo $CURRENT | cut -d'/' -f2 | cut -d':' -f1)

          CURRENT_REV=$(echo $CURRENT | rev | cut -d':' -f1 | rev)
          if [ "$CURRENT_REV" -le 1 ]; then
            echo "No previous revision available."
            exit 1
          fi
          PREVIOUS_REV=$((CURRENT_REV-1))

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${FAMILY}:${PREVIOUS_REV} \
            --force-new-deployment