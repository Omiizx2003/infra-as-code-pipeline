name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ecommerce-staging
  ECS_CLUSTER: ecommerce-staging-cluster
  ECS_SERVICE: ecommerce-service

jobs:
  production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t $ECR_REPOSITORY ./app

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push image
        run: |
          docker push \
          343980058896.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        id: deploy
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for Deployment
        id: wait
        continue-on-error: true
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

      - name: Rollback
        if: steps.wait.outcome == 'failure'
        run: |
          echo "Deployment failed. Finding previous working task definition..."

          CURRENT=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query "services[0].taskDefinition" \
            --output text)

          echo "Current Task Definition: $CURRENT"

          FAMILY=$(basename "$CURRENT" | cut -d':' -f1)

          PREVIOUS=$(aws ecs list-task-definitions \
            --family-prefix $FAMILY \
            --status ACTIVE \
            --sort DESC \
            --region $AWS_REGION \
            --query "taskDefinitionArns[1]" \
            --output text)

          if [ "$PREVIOUS" = "None" ] || [ -z "$PREVIOUS" ]; then
            echo "No previous ACTIVE task definition found."
            exit 1
          fi

          echo "Rolling back to $PREVIOUS"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $PREVIOUS \
            --force-new-deployment \
            --region $AWS_REGION

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

          echo "Rollback completed successfully."